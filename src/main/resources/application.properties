spring.application.name=firmaec-backend
server.servlet.context-path=/firmaec-api

# Límite de tamaño de peticiones (certificados + PDFs en Base64)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-post-size=20971520

# URL oficial del endpoint transversal de FirmaEC
firmaec.api.url=https://api.firmadigital.gob.ec/api/appfirmardocumento

